name: OpenSSF Scorecard Scan

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true