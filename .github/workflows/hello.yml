name: Hello World 


on: 
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:



permissions:
  contents: read
  pages: write
  id-token: write

jobs: 
  hello: 
    runs-on: ubuntu-latest
    steps: 
      - name: Hello World
        run: echo "Hello World"
      - name: Afficher les variables d'environnement
        run: env
      - name: Afficher les info sur la contexte
        run: | 
          echo "Repository: ${{ github.repository }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Actor: ${{ github.actor }}"