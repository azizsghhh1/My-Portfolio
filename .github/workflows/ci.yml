name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
  test: 
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Start the application locally
        run: |
          npm run dev &
          sleep 5
      - name: Run tests
        run: |
          curl -X POST http://localhost:3000/api/chat \
            -H "Content-Type: application/json" \
            -d '{
              "messages": [{"role":"user","content":"Hello"}],
              "language":"en"
            }'

  
