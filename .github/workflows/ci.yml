name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start the application locally
        run: |
          npm run dev -- --port 3000 &
          # wait until the server is reachable (avoid flaky sleep)
          for i in {1..30}; do
            curl -sf http://127.0.0.1:3000/ >/dev/null && break
            sleep 1
          done
        
      - name: Run tests
        run: curl localhost:3000

      - name: Chatbot test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          curl -X POST http://127.0.0.1:3000/api/chat \
            -H "Content-Type: application/json" \
            -d '{
              "messages": [{"role":"user","content":"Hello"}],
              "language":"en"
            }'
    
